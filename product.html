<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="NOIRVEIL product detail.">
  <meta property="og:title" content="NOIRVEIL Product | NOIRVEIL">
  <meta property="og:description" content="NOIRVEIL product photos, sizes, prices, and ordering info.">
  <meta property="og:image" content="assets/norvali_logo.png">
  <title data-i18n="title_product">NOIRVEIL Product | NOIRVEIL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow+Condensed:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body class="template-product">
  <header class="site-header" data-header>
    <button class="menu-toggle" type="button" data-menu-toggle aria-controls="mobile-menu" aria-expanded="false" aria-label="Open navigation"><span></span><span></span></button>
    <nav class="desktop-nav" aria-label="Primary">
      <a class="nav-link page-link" href="index.html" data-i18n="home">Home</a>
      <a class="nav-link page-link is-active" href="catalog.html" data-i18n="catalog">Catalog</a>
      <a class="nav-link page-link" href="contact.html" data-i18n="contact">Contact</a>
    </nav>
    <a class="logo-link page-link" href="index.html" aria-label="NOIRVEIL home"><canvas id="logo-canvas" width="100" height="100"></canvas></a>
    <div class="header-actions">
      <div class="language-switch" aria-label="Language"><button type="button" data-lang="en" data-i18n="lang_en">EN</button><span>|</span><button type="button" data-lang="uk" data-i18n="lang_uk">UK</button></div>
      <button class="icon-button" type="button" data-search-trigger aria-label="Search"><svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="10.5" cy="10.5" r="6.5"></circle><path d="M15.5 15.5 21 21"></path></svg></button>
      <button class="icon-button account-button" type="button" aria-label="Account"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12.5c3 0 5.5-2.3 5.5-5.2S15 2 12 2 6.5 4.3 6.5 7.3 9 12.5 12 12.5Z"></path><path d="M4 22c.8-4.1 3.7-6.2 8-6.2s7.2 2.1 8 6.2"></path></svg></button>
      <a class="icon-link page-link" href="cart.html" aria-label="Cart"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 4h2.8l2 12.3h10.8L21 8H7"></path><path d="M9 21h.2M18 21h.2"></path></svg><span class="cart-count">2</span></a>
    </div>
  </header>

  <div class="mobile-menu" id="mobile-menu" data-mobile-menu aria-hidden="true">
    <button class="mobile-close" type="button" data-menu-close aria-label="Close navigation"><span></span><span></span></button>
    <nav class="mobile-nav" aria-label="Mobile">
      <a class="mobile-nav-link page-link" href="index.html" data-i18n="home">Home</a>
      <a class="mobile-nav-link page-link is-active" href="catalog.html" data-i18n="catalog">Catalog</a>
      <a class="mobile-nav-link page-link" href="contact.html" data-i18n="contact">Contact</a>
    </nav>
    <div class="mobile-menu-meta"><span data-i18n="brand_name">NOIRVEIL</span><span data-i18n="black_chrome_series">BLACK CHROME SERIES</span></div>
  </div>

  <div class="search-panel" data-search-panel aria-hidden="true">
    <form class="search-form" role="search">
      <label for="site-search" data-i18n="search_norvail">Search NOIRVEIL</label>
      <div class="search-row"><input id="site-search" type="search" placeholder="pants, tracksuit, sakura" data-i18n-placeholder="search_placeholder" autocomplete="off"><button class="text-button magnetic" type="submit" data-i18n="search">Search</button></div>
      <p data-i18n="search_helper">Ready for Shopify predictive search.</p>
    </form>
  </div>

  <main class="page-shell">
    <section class="product-detail page-with-top" data-product-detail>
      <div class="product-gallery reveal" data-product-gallery></div>
      <article class="product-info reveal" data-product-info></article>
    </section>

    <section class="section related-section" aria-labelledby="related-title">
      <div class="section-head reveal">
        <p class="section-kicker" id="related-title" data-i18n="you_may_like">You May Like It</p>
      </div>
      <div class="product-grid related-grid" data-related-grid></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-brand"><img src="assets/norvali_logo.png" alt="NOIRVEIL logo" width="44" height="44" loading="lazy"><span data-i18n="footer_copyright">© 2026 NOIRVEIL</span></div>
    <a class="footer-link" href="#" data-i18n="terms_policies">Terms &amp; Policies</a>
    <a class="footer-icon" href="https://www.instagram.com/noirveil_ua?igsh=MWx5YXh2Nmk0NG5hNQ%3D%3D&utm_source=qr" data-social-instagram aria-label="Instagram"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="4" width="16" height="16"></rect><circle cx="12" cy="12" r="3.5"></circle><path d="M17 7h.1"></path></svg></a>
  </footer>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js" defer></script>
  <script src="assets/logo3d.js" defer></script>
  <script src="assets/i18n.js" defer></script>
  <script src="assets/main.js" defer></script>
</body>
</html>
